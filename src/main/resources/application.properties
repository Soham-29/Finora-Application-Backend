#DB configurations
spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager
spring.datasource.username=root
spring.datasource.password=S@1234567k

server.servlet.context-path=/api/v1.0

#JPA Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email Configurations
spring.mail.host=smtp-relay.brevo.com
#spring.mail.port=587
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${MAIL_FROM}

#JWT Configurations
jwt.secret=your-super-secret-key-must-be-at-least-32-chars!!
jwt.expiration-ms=86400000

money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL}
app.activation.url=${MONEY_MANAGER_ACTIVATION_URL}

spring.profiles.active=prod




